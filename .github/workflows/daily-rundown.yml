name: Daily Rundown

on:
  schedule:
    - cron: "30 16 * * *"
  workflow_dispatch:

jobs:
  check-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Send today's alerts to every registered chat
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: uv run python -m scripts.telegram_alerts
